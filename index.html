<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR視点 障害物よけゲーム（スマホ完全対応版）</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff3333; font-size: 48px; font-weight: bold; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); display: none; text-align: center; pointer-events: none; }
        #sub-msg { font-size: 20px; color: white; margin-top: 10px; }
    </style>
    <script src="three.min.js"></script>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="msg">GAME OVER<div id="sub-msg">タップかスペースキーでリトライ</div></div>

    <script>
        const scene = new THREE.Scene();
        //scene.fog = new THREE.FogExp2(0x111122, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x111122);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const floorGeo = new THREE.PlaneGeometry(20, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x224433 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 【変更】無機質なデジタル線（grid）は削除しました

        // 【追加】背景に空のイラストを配置
        // 【追加】背景に空のイラストを配置
        const skyTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/umino-kurage/maruwoyokeru/main/S__137535491_0.jpg');
        const skyGeo = new THREE.PlaneGeometry(60, 45); // 横幅をさらに大きく
        const skyMat = new THREE.MeshBasicMaterial({ map: skyTexture });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        sky.position.set(0, 10, -35); // 地面が刺さらない絶妙な距離感に調整
        scene.add(sky);

        // 【追加】地面を流れる葉っぱの準備
        const leafTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/umino-kurage/maruwoyokeru/main/S__137535492_0.png');
        const leafGeo = new THREE.PlaneGeometry(0.5, 0.5);
        const leafMat = new THREE.MeshBasicMaterial({ map: leafTexture, transparent: true, side: THREE.DoubleSide });
        const leaves = [];
        const maxLeaves = 20; // 画面に同時に出す葉っぱの枚数

        for (let i = 0; i < maxLeaves; i++) {
            const leafMesh = new THREE.Mesh(leafGeo, leafMat);
            leafMesh.position.set(
                (Math.random() - 0.5) * 15, // 左右に散らす
                0.02,                       // 地面すれすれ（床より少し上）
                -Math.random() * 40         // 奥に散らす
            );
            leafMesh.rotation.x = -Math.PI / 2; // 床にペタッと寝かせる
            leafMesh.rotation.z = Math.random() * Math.PI; // 葉っぱの向きをランダムに
            scene.add(leafMesh);
            leaves.push(leafMesh);
        }

        let score = 0;
        let isGameOver = false;
        
        const player = { x: 0, y: 0, z: -1, vy: 0, gravity: -0.015, jumpForce: 0.3, isJumping: false, height: 1.6 };
        const obstacles = [];
        const obstacleSpeed = 0.6;
        let spawnTimeout;

        function spawnObstacle() {
            if (isGameOver) return;
            const geo = new THREE.PlaneGeometry(3.0, 3.0);
            
            const texture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/umino-kurage/maruwoyokeru/main/F9D3A316-7798-46BB-8BC5-A44B22299324.png');
            
            const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);
            
            const randomZ = -60 - (Math.random() * 50);
            mesh.position.set(0, 1.1, randomZ);
            scene.add(mesh);
            obstacles.push(mesh);

            spawnTimeout = setTimeout(spawnObstacle, 1100 + Math.random() * 700);
        }
        spawnObstacle();

        function jump() {
            if (isGameOver) { resetGame(); return; }
            if (!player.isJumping) { player.vy = player.jumpForce; player.isJumping = true; }
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
        window.addEventListener('click', jump);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });

        function animate() {
            requestAnimationFrame(animate);

            if (!isGameOver) {
                score++;
                document.getElementById('score').innerText = score;

                // 【変更】線の代わりに、葉っぱたちをお花と同じ速度で手前に流して「走ってる感」を出します！
                leaves.forEach((leaf) => {
                    leaf.position.z += obstacleSpeed;
                    // 画面より手前（プレイヤーの後ろ側）まで来たら、またはるか奥へリセット（無限ループ）
                    if (leaf.position.z > 2) {
                        leaf.position.z = -38;
                        leaf.position.x = (Math.random() - 0.5) * 15;
                    }
                });

                player.vy += player.gravity;
                player.y += player.vy;
                if (player.y <= 0) { player.y = 0; player.vy = 0; player.isJumping = false; }

                camera.position.y = 1.6 + player.y;

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += obstacleSpeed;

                    if (obs.position.z > 5) { scene.remove(obs); obstacles.splice(i, 1); continue; }

                    if (obs.position.z > -2.0 && obs.position.z < 0.0) {
                        if (player.y < 0.8) { isGameOver = true; document.getElementById('msg').style.display = 'block'; }
                    }
                }
            }
            renderer.render(scene, camera);
        }

        function resetGame() {
            isGameOver = false; score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('msg').style.display = 'none';
            player.y = 0; player.vy = 0; player.isJumping = false; camera.position.y = 1.6;
            obstacles.forEach(obs => scene.remove(obs)); obstacles.length = 0;
            
            // 【追加】リトライ時に葉っぱたちの位置も初期化してリセット
            leaves.forEach((leaf) => {
                leaf.position.set((Math.random() - 0.5) * 15, 0.02, -Math.random() * 40);
            });

            clearTimeout(spawnTimeout); spawnObstacle();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
